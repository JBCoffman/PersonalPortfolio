<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Tech Portrait</title>
    <style>
        :root {
            --color-dark:       #0F1720;
            --color-deepwater:  #1A2535;
            --color-gulf:       #6B8E96;
            --color-gulf-light: #8FABB2;
            --color-proproot:   #8C9688;
            --color-seagrass:   #C4A962;
            --color-oyster:     #EDE9E1;
            --color-fog:        #F4F6F7;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--color-fog);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas {
            /* Ensures crisp rendering on retina displays */
            width: 100%;
            max-width: 800px; 
            height: auto;
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <canvas id="portraitCanvas"></canvas>
    
    <script src="https://unpkg.com/delaunator@5.0.0/delaunator.min.js"></script>

    <script>
        const canvas = document.getElementById('portraitCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const image = new Image();
        
        // --- TWEAK THESE FOR YOUR SPECIFIC PHOTO ---
        const EDGE_THRESHOLD = 10; // Lower = more sensitive to facial details
        const BASE_SPACING = 14;   // Spacing of the background/flat areas
        const DETAIL_STEP = 4;     // How tightly to pack points around features
        
        // Physics constants for the "Warp" effect
        const MOUSE_RADIUS = 100;
        const MOUSE_FORCE = 1.2;
        const SPRING = 0.08;       // How fast it snaps back
        const FRICTION = 0.85;     // How bouncy it is

        let particles = [];
        let triangles = [];
        let mouse = { x: -1000, y: -1000 };
        let palette = [];
        let dpr = window.devicePixelRatio || 1;

        function initColors() {
            const root = getComputedStyle(document.documentElement);
            // Ordered from darkest to lightest for mapping
            palette = [
                root.getPropertyValue('--color-dark').trim(),
                root.getPropertyValue('--color-deepwater').trim(),
                root.getPropertyValue('--color-gulf').trim(),
                root.getPropertyValue('--color-gulf-light').trim(),
                root.getPropertyValue('--color-oyster').trim()
            ];
        }

        // Helper: Get luminance of a pixel
        function getLuma(data, x, y, width) {
            const i = (y * width + x) * 4;
            return data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
        }

        image.onload = () => {
            initColors();
            
            // Set up responsive canvas rendering
            const scale = Math.min(1, 800 / image.width);
            const w = Math.floor(image.width * scale);
            const h = Math.floor(image.height * scale);
            
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            ctx.scale(dpr, dpr);
            
            // Draw image to an offscreen canvas to analyze pixels
            const offscreen = document.createElement('canvas');
            offscreen.width = w; offscreen.height = h;
            const oCtx = offscreen.getContext('2d');
            oCtx.drawImage(image, 0, 0, w, h);
            const imgData = oCtx.getImageData(0, 0, w, h).data;

            const points = [];

            // 1. Generate a sparse base grid so the whole image has structure
            for (let y = 0; y < h; y += BASE_SPACING) {
                for (let x = 0; x < w; x += BASE_SPACING) {
                    points.push([x + (Math.random()-0.5)*5, y + (Math.random()-0.5)*5]);
                }
            }

            // 2. Edge Detection Pass: Add dense points around facial features
            for (let y = 0; y < h - DETAIL_STEP; y += DETAIL_STEP) {
                for (let x = 0; x < w - DETAIL_STEP; x += DETAIL_STEP) {
                    const luma = getLuma(imgData, x, y, w);
                    const lumaRight = getLuma(imgData, x + DETAIL_STEP, y, w);
                    const lumaBottom = getLuma(imgData, x, y + DETAIL_STEP, w);
                    
                    // If contrast is high between adjacent pixels, it's an edge
                    const contrast = Math.abs(luma - lumaRight) + Math.abs(luma - lumaBottom);
                    
                    if (contrast > EDGE_THRESHOLD) {
                        // 70% chance to drop a point to keep it organic, not a rigid line
                        if (Math.random() > 0.3) points.push([x, y]); 
                    }
                }
            }

            // Convert points to physics particles
            points.forEach(p => {
                particles.push({ x: p[0], y: p[1], ox: p[0], oy: p[1], vx: 0, vy: 0 });
            });

            // Triangulate
            const delaunay = new Delaunator(points.flat());
            const indices = delaunay.triangles;

            // Map colors based on the centroid of each triangle
            for (let i = 0; i < indices.length; i += 3) {
                const p1 = particles[indices[i]];
                const p2 = particles[indices[i+1]];
                const p3 = particles[indices[i+2]];
                
                const cx = Math.floor((p1.ox + p2.ox + p3.ox) / 3);
                const cy = Math.floor((p1.oy + p2.oy + p3.oy) / 3);
                
                const safeX = Math.max(0, Math.min(cx, w - 1));
                const safeY = Math.max(0, Math.min(cy, h - 1));
                
                const brightness = getLuma(imgData, safeX, safeY, w);

                // Ignore background pixels (assuming they are near white/transparent in your cutout)
                // If it's pure white, we color it fog so it blends into the page
                let color;
                if (brightness > 240) { 
                    color = getComputedStyle(document.documentElement).getPropertyValue('--color-fog').trim();
                } else {
                    const colorIdx = Math.min(palette.length - 1, Math.floor((brightness / 255) * palette.length));
                    color = palette[colorIdx];
                }

                triangles.push({ a: indices[i], b: indices[i+1], c: indices[i+2], color: color });
            }

            requestAnimationFrame(animate);
        };

        function animate() {
            // Fill background with your fog color
            ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--color-fog').trim(); 
            ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);

            // Physics calculation
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                
                const dx = mouse.x - p.x;
                const dy = mouse.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // Repulsion
                if (dist < MOUSE_RADIUS) {
                    const force = (MOUSE_RADIUS - dist) / MOUSE_RADIUS;
                    const angle = Math.atan2(dy, dx);
                    p.vx -= Math.cos(angle) * force * MOUSE_FORCE;
                    p.vy -= Math.sin(angle) * force * MOUSE_FORCE;
                }

                // Snap back to original position
                p.vx += (p.ox - p.x) * SPRING;
                p.vy += (p.oy - p.y) * SPRING;

                // Dampen movement
                p.vx *= FRICTION;
                p.vy *= FRICTION;

                p.x += p.vx;
                p.y += p.vy;
            }

            // Draw Geometry
            for (let i = 0; i < triangles.length; i++) {
                const t = triangles[i];
                const pA = particles[t.a];
                const pB = particles[t.b];
                const pC = particles[t.c];

                ctx.fillStyle = t.color;
                ctx.strokeStyle = t.color; 
                ctx.lineWidth = 0.5;

                ctx.beginPath();
                ctx.moveTo(pA.x, pA.y);
                ctx.lineTo(pB.x, pB.y);
                ctx.lineTo(pC.x, pC.y);
                ctx.closePath();
                
                ctx.fill();
                ctx.stroke(); 
            }

            requestAnimationFrame(animate);
        }

        // Mouse tracking
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            // Map screen coordinates strictly to canvas drawing space
            const scaleX = (canvas.width / dpr) / rect.width;
            const scaleY = (canvas.height / dpr) / rect.height;
            mouse.x = (e.clientX - rect.left) * scaleX;
            mouse.y = (e.clientY - rect.top) * scaleY;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });

        // Load the image! 
        image.src = 'Headshot.PNG'; 
    </script>
</body>
</html>
