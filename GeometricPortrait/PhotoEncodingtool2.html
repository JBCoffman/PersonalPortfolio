<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Geometric Portrait</title>
    <style>
        :root {
            --color-dark:       #0F1720;
            --color-deepwater:  #1A2535;
            --color-gulf:       #6B8E96;
            --color-gulf-light: #8FABB2;
            --color-proproot:   #8C9688;
            --color-seagrass:   #C4A962;
            --color-oyster:     #EDE9E1;
            --color-fog:        #F4F6F7;
        }

        body {
            background-color: var(--color-fog);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        canvas {
            cursor: crosshair;
            box-shadow: 0 10px 30px rgba(15, 23, 32, 0.1);
        }
    </style>
</head>
<body>

    <canvas id="portraitCanvas"></canvas>
    <script src="https://unpkg.com/delaunator@5.0.0/delaunator.min.js"></script>

    <script>
        const canvas = document.getElementById('portraitCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // Optimize for opaque background
        const image = new Image();
        
        // Physics constants
        const MOUSE_RADIUS = 80;
        const MOUSE_FORCE = 0.8;
        const SPRING = 0.1;
        const FRICTION = 0.85;
        const GRID_SPACING = 8; // Lower = higher fidelity (and heavier compute)

        let particles = [];
        let triangles = [];
        let mouse = { x: -1000, y: -1000 };
        let palette = [];

        function initColors() {
            const root = getComputedStyle(document.documentElement);
            palette = [
                root.getPropertyValue('--color-dark').trim(),
                root.getPropertyValue('--color-deepwater').trim(),
                root.getPropertyValue('--color-gulf').trim(),
                root.getPropertyValue('--color-gulf-light').trim(),
                root.getPropertyValue('--color-oyster').trim()
            ];
        }

        image.onload = () => {
            initColors();
            
            // Limit max width to maintain performance on high-res images
            const scale = Math.min(1, 800 / image.width);
            canvas.width = image.width * scale;
            canvas.height = image.height * scale;
            
            // Draw image to sample pixel data
            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            tempCanvas.width = canvas.width;
            tempCanvas.height = canvas.height;
            tCtx.drawImage(image, 0, 0, canvas.width, canvas.height);
            const imgData = tCtx.getImageData(0, 0, canvas.width, canvas.height).data;

            // Generate dense point cloud
            const points = [];
            for (let y = 0; y < canvas.height; y += GRID_SPACING) {
                for (let x = 0; x < canvas.width; x += GRID_SPACING) {
                    // Add subtle variance to break up rigid grid lines
                    const jx = x + (Math.random() - 0.5) * (GRID_SPACING * 0.8);
                    const jy = y + (Math.random() - 0.5) * (GRID_SPACING * 0.8);
                    points.push([jx, jy]);
                    
                    particles.push({
                        x: jx, y: jy,
                        ox: jx, oy: jy,
                        vx: 0, vy: 0
                    });
                }
            }

            // Triangulate topology
            const delaunay = new Delaunator(points.flat());
            const indices = delaunay.triangles;

            // Map static colors to faces based on centroid brightness
            for (let i = 0; i < indices.length; i += 3) {
                const p1 = particles[indices[i]];
                const p2 = particles[indices[i+1]];
                const p3 = particles[indices[i+2]];
                
                const cx = Math.floor((p1.ox + p2.ox + p3.ox) / 3);
                const cy = Math.floor((p1.oy + p2.oy + p3.oy) / 3);
                
                // Keep lookups within bounds
                const safeX = Math.max(0, Math.min(cx, canvas.width - 1));
                const safeY = Math.max(0, Math.min(cy, canvas.height - 1));
                
                const pixelIdx = (safeY * canvas.width + safeX) * 4;
                const r = imgData[pixelIdx];
                const g = imgData[pixelIdx + 1];
                const b = imgData[pixelIdx + 2];
                const brightness = (r * 0.299 + g * 0.587 + b * 0.114);

                // Map 0-255 brightness to our 5-color palette array
                const colorIdx = Math.min(palette.length - 1, Math.floor((brightness / 255) * palette.length));

                triangles.push({
                    a: indices[i],
                    b: indices[i+1],
                    c: indices[i+2],
                    color: palette[colorIdx]
                });
            }

            // Start render loop
            requestAnimationFrame(animate);
        };

        function animate() {
            // Fill background with exact fog color
            ctx.fillStyle = '#F4F6F7'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Calculate vertex kinematics
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                
                const dx = mouse.x - p.x;
                const dy = mouse.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                // Repulsion logic
                if (dist < MOUSE_RADIUS) {
                    const force = (MOUSE_RADIUS - dist) / MOUSE_RADIUS;
                    const angle = Math.atan2(dy, dx);
                    p.vx -= Math.cos(angle) * force * MOUSE_FORCE;
                    p.vy -= Math.sin(angle) * force * MOUSE_FORCE;
                }

                // Spring logic
                p.vx += (p.ox - p.x) * SPRING;
                p.vy += (p.oy - p.y) * SPRING;

                // Friction logic
                p.vx *= FRICTION;
                p.vy *= FRICTION;

                p.x += p.vx;
                p.y += p.vy;
            }

            // Render geometry using mutated coordinates
            for (let i = 0; i < triangles.length; i++) {
                const t = triangles[i];
                const pA = particles[t.a];
                const pB = particles[t.b];
                const pC = particles[t.c];

                ctx.fillStyle = t.color;
                ctx.strokeStyle = t.color; // Fills micro-gaps between triangles
                ctx.lineWidth = 0.5;

                ctx.beginPath();
                ctx.moveTo(pA.x, pA.y);
                ctx.lineTo(pB.x, pB.y);
                ctx.lineTo(pC.x, pC.y);
                ctx.closePath();
                
                ctx.fill();
                ctx.stroke(); 
            }

            requestAnimationFrame(animate);
        }

        // Event Listeners for Interaction
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            // Map screen space to canvas space in case of CSS scaling
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouse.x = (e.clientX - rect.left) * scaleX;
            mouse.y = (e.clientY - rect.top) * scaleY;
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = -1000;
            mouse.y = -1000;
        });

        // Initialize (ensure your image path is correct)
        image.src = 'headshot.png'; 
    </script>
</body>
</html>
