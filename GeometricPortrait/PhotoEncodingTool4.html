<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Tech Portrait</title>
    <style>
        :root {
            --color-dark:       #0F1720;
            --color-deepwater:  #1A2535;
            --color-gulf:       #6B8E96;
            --color-gulf-light: #8FABB2;
            --color-proproot:   #8C9688;
            --color-seagrass:   #C4A962;
            --color-oyster:     #EDE9E1;
            --color-fog:        #F4F6F7;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--color-fog);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            max-width: 800px; 
            height: auto;
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <canvas id="portraitCanvas"></canvas>
    <script src="https://unpkg.com/delaunator@5.0.0/delaunator.min.js"></script>

    <script>
        const canvas = document.getElementById('portraitCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const image = new Image();
        
        // --- Mesh & Detail Settings ---
        const EDGE_THRESHOLD = 15;
        const BASE_SPACING = 14;
        const DETAIL_STEP = 4;
        
        // --- Fluid & Light Physics ---
        // FIX 1: Dramatically reduced interaction radius (1/6th original size)
        const INTERACTION_RADIUS = 20; 
        const WATER_TUG = 0.4;     
        const SPRING = 0.03;       
        const FRICTION = 0.92;     
        
        let particles = [];
        let triangles = [];
        let mouse = { x: -1000, y: -1000, vx: 0, vy: 0 };
        let lastMouse = { x: -1000, y: -1000 };
        let mouseInCanvas = false; // FIX 2: Track if mouse is active
        let dpr = window.devicePixelRatio || 1;
        
        let paletteRGB = [];
        let fogRGB, seagrassRGB, oysterRGB;

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }

        function initColors() {
            const root = getComputedStyle(document.documentElement);
            const hexPalette = [
                root.getPropertyValue('--color-dark').trim(),
                root.getPropertyValue('--color-deepwater').trim(),
                root.getPropertyValue('--color-gulf').trim(),
                root.getPropertyValue('--color-gulf-light').trim(),
                root.getPropertyValue('--color-oyster').trim()
            ];
            
            paletteRGB = hexPalette.map(hexToRgb);
            fogRGB = hexToRgb(root.getPropertyValue('--color-fog').trim());
            seagrassRGB = hexToRgb(root.getPropertyValue('--color-seagrass').trim());
            oysterRGB = hexToRgb(root.getPropertyValue('--color-oyster').trim());    
        }

        function lerpColor(c1, c2, factor) {
            return {
                r: Math.round(c1.r + (c2.r - c1.r) * factor),
                g: Math.round(c1.g + (c2.g - c1.g) * factor),
                b: Math.round(c1.b + (c2.b - c1.b) * factor)
            };
        }

        function getLuma(data, x, y, width) {
            const i = (y * width + x) * 4;
            return data[i] * 0.299 + data[i+1] * 0.587 + data[i+2] * 0.114;
        }

        image.onload = () => {
            initColors();
            
            const scale = Math.min(1, 800 / image.width);
            const w = Math.floor(image.width * scale);
            const h = Math.floor(image.height * scale);
            
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            ctx.scale(dpr, dpr);
            
            const offscreen = document.createElement('canvas');
            offscreen.width = w; offscreen.height = h;
            const oCtx = offscreen.getContext('2d');
            oCtx.drawImage(image, 0, 0, w, h);
            const imgData = oCtx.getImageData(0, 0, w, h).data;

            const points = [];

            for (let y = 0; y < h; y += BASE_SPACING) {
                for (let x = 0; x < w; x += BASE_SPACING) {
                    points.push([x + (Math.random()-0.5)*5, y + (Math.random()-0.5)*5]);
                }
            }

            for (let y = 0; y < h - DETAIL_STEP; y += DETAIL_STEP) {
                for (let x = 0; x < w - DETAIL_STEP; x += DETAIL_STEP) {
                    const luma = getLuma(imgData, x, y, w);
                    const lRight = getLuma(imgData, x + DETAIL_STEP, y, w);
                    const lBot = getLuma(imgData, x, y + DETAIL_STEP, w);
                    
                    if (Math.abs(luma - lRight) + Math.abs(luma - lBot) > EDGE_THRESHOLD) {
                        if (Math.random() > 0.3) points.push([x, y]); 
                    }
                }
            }

            points.forEach(p => {
                particles.push({ x: p[0], y: p[1], ox: p[0], oy: p[1], vx: 0, vy: 0 });
            });

            const delaunay = new Delaunator(points.flat());
            const indices = delaunay.triangles;

            for (let i = 0; i < indices.length; i += 3) {
                const pA = particles[indices[i]];
                const pB = particles[indices[i+1]];
                const pC = particles[indices[i+2]];
                
                const cx = Math.floor((pA.ox + pB.ox + pC.ox) / 3);
                const cy = Math.floor((pA.oy + pB.oy + pC.oy) / 3);
                
                const safeX = Math.max(0, Math.min(cx, w - 1));
                const safeY = Math.max(0, Math.min(cy, h - 1));
                
                const brightness = getLuma(imgData, safeX, safeY, w);

                let baseColorRGB;
                let isBackground = false;
                
                if (brightness > 240) { 
                    baseColorRGB = fogRGB;
                    isBackground = true;
                } else {
                    const idx = Math.min(paletteRGB.length - 1, Math.floor((brightness / 255) * paletteRGB.length));
                    baseColorRGB = paletteRGB[idx];
                }

                triangles.push({
                    a: indices[i], b: indices[i+1], c: indices[i+2],
                    baseColor: baseColorRGB,
                    isBackground: isBackground
                });
            }

            requestAnimationFrame(animate);
        };

        function animate() {
            ctx.fillStyle = `rgb(${fogRGB.r}, ${fogRGB.g}, ${fogRGB.b})`;
            ctx.fillRect(0, 0, canvas.width / dpr, canvas.height / dpr);

            // FIX 2: Calculate safe velocity with hard limits to prevent lag-explosions
            if (mouseInCanvas) {
                let rawVx = mouse.x - lastMouse.x;
                let rawVy = mouse.y - lastMouse.y;
                
                // Cap max velocity to 30px per frame to prevent extreme tidal waves
                const maxV = 30;
                mouse.vx = Math.max(-maxV, Math.min(maxV, rawVx));
                mouse.vy = Math.max(-maxV, Math.min(maxV, rawVy));
                
                lastMouse.x = mouse.x;
                lastMouse.y = mouse.y;
            } else {
                mouse.vx = 0;
                mouse.vy = 0;
            }

            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                
                const dx = mouse.x - p.x;
                const dy = mouse.y - p.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (mouseInCanvas && dist < INTERACTION_RADIUS) {
                    const influence = 1 - (dist / INTERACTION_RADIUS);
                    p.vx += (mouse.vx * influence * WATER_TUG);
                    p.vy += (mouse.vy * influence * WATER_TUG);
                }

                p.vx += (p.ox - p.x) * SPRING;
                p.vy += (p.oy - p.y) * SPRING;
                p.vx *= FRICTION;
                p.vy *= FRICTION;
                p.x += p.vx;
                p.y += p.vy;
            }

            for (let i = 0; i < triangles.length; i++) {
                const t = triangles[i];
                const pA = particles[t.a];
                const pB = particles[t.b];
                const pC = particles[t.c];

                const currentCx = (pA.x + pB.x + pC.x) / 3;
                const currentCy = (pA.y + pB.y + pC.y) / 3;

                const dx = mouse.x - currentCx;
                const dy = mouse.y - currentCy;
                const dist = Math.sqrt(dx * dx + dy * dy);

                let renderColor = t.baseColor;

                if (mouseInCanvas && !t.isBackground && dist < INTERACTION_RADIUS) {
                    const intensity = Math.pow(1 - (dist / INTERACTION_RADIUS), 2); 
                    let targetColor = seagrassRGB;
                    if (intensity > 0.7) targetColor = oysterRGB; 
                    
                    renderColor = lerpColor(t.baseColor, targetColor, intensity);
                }

                const colorString = `rgb(${renderColor.r}, ${renderColor.g}, ${renderColor.b})`;
                ctx.fillStyle = colorString;
                
                if (mouseInCanvas && !t.isBackground && dist < INTERACTION_RADIUS) {
                    ctx.strokeStyle = `rgb(${oysterRGB.r}, ${oysterRGB.g}, ${oysterRGB.b})`;
                    ctx.lineWidth = 0.8;
                } else {
                    ctx.strokeStyle = colorString; 
                    ctx.lineWidth = 0.5;
                }

                ctx.beginPath();
                ctx.moveTo(pA.x, pA.y);
                ctx.lineTo(pB.x, pB.y);
                ctx.lineTo(pC.x, pC.y);
                ctx.closePath();
                ctx.fill();
                ctx.stroke(); 
            }

            requestAnimationFrame(animate);
        }

        // --- Standardized Mouse Tracking ---
        function updateMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = (canvas.width / dpr) / rect.width;
            const scaleY = (canvas.height / dpr) / rect.height;
            mouse.x = (e.clientX - rect.left) * scaleX;
            mouse.y = (e.clientY - rect.top) * scaleY;
        }

        // FIX 2: Intercept entry to prevent the teleportation delta
        canvas.addEventListener('mouseenter', (e) => {
            updateMousePos(e);
            lastMouse.x = mouse.x;
            lastMouse.y = mouse.y;
            mouse.vx = 0;
            mouse.vy = 0;
            mouseInCanvas = true;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!mouseInCanvas) {
                // Failsafe for fast page loads
                updateMousePos(e);
                lastMouse.x = mouse.x;
                lastMouse.y = mouse.y;
                mouseInCanvas = true;
            } else {
                updateMousePos(e);
            }
        });

        canvas.addEventListener('mouseleave', () => {
            mouseInCanvas = false;
            mouse.x = -1000;
            mouse.y = -1000;
            lastMouse.x = -1000;
            lastMouse.y = -1000;
            mouse.vx = 0;
            mouse.vy = 0;
        });

        image.src = 'Headshot.PNG'; 
    </script>
</body>
</html>
